
<canvas id="c" style="display:block;background:#000;width:100%;"></canvas>
<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

#c{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:block;
}
</style>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let particles = [];
let stars = [];
let shootingStars = [];
let sparkles = [];
let phase = 'scatter'; // scatter -> gather -> pulse -> text
let phaseTimer = 0;
let textAlpha = 0;
let heartbeat = 0;
let heartScale = 1;
const PARTICLE_COUNT = 1800;
const STAR_COUNT = 220;

function resize() {
  const dpr = window.devicePixelRatio || 1;

  W = window.innerWidth;
  H = window.innerHeight;

  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  canvas.width = W * dpr;
  canvas.height = H * dpr;

  ctx.setTransform(dpr,0,0,dpr,0,0);

  cx = W / 2;
  cy = H / 2;
}
function heartX(t, s) { return s * 16 * Math.pow(Math.sin(t), 3); }
function heartY(t, s) { return -s * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

function getHeartTarget(i, total) {
  const t = (i / total) * Math.PI * 2;
  const scale = Math.min(W, H) * 0.028;
  return { x: cx + heartX(t, scale), y: cy + heartY(t, scale) };
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.4 + 0.3,
      alpha: Math.random() * 0.7 + 0.2,
      twinkle: Math.random() * 0.02 + 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const target = getHeartTarget(i, PARTICLE_COUNT);
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * Math.max(W, H) * 0.6 + 100;
    particles.push({
      x: cx + Math.cos(angle) * dist,
      y: cy + Math.sin(angle) * dist,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2,
      tx: target.x, ty: target.y,
      r: Math.random() * 1.8 + 0.5,
      alpha: Math.random() * 0.6 + 0.4,
      hue: Math.random() < 0.6 ? 320 + Math.random() * 30 : 270 + Math.random() * 30,
      gathered: false,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: (Math.random() - 0.5) * 0.04
    });
  }
}

function spawnShootingStar() {
  const y = Math.random() * H * 0.5;
  shootingStars.push({
    x: -60, y,
    vx: Math.random() * 10 + 8,
    vy: Math.random() * 3 + 1,
    len: Math.random() * 80 + 60,
    alpha: 1, life: 1
  });
}

function drawGalaxy() {
  const grd = ctx.createRadialGradient(cx, cy - H * 0.1, 0, cx, cy, Math.max(W, H) * 0.7);
  grd.addColorStop(0, 'rgba(40,10,60,0.5)');
  grd.addColorStop(0.4, 'rgba(10,5,30,0.4)');
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

function drawStars(t) {
  for (const s of stars) {
    const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.twinkle * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,255,${a})`;
    ctx.fill();
  }
}

function drawShootingStars() {
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    s.x += s.vx; s.y += s.vy; s.life -= 0.018;
    if (s.life <= 0 || s.x > W + 80) { shootingStars.splice(i, 1); continue; }
    const grd = ctx.createLinearGradient(s.x - s.len, s.y, s.x, s.y);
    grd.addColorStop(0, 'rgba(255,200,255,0)');
    grd.addColorStop(1, `rgba(255,220,255,${s.life * 0.9})`);
    ctx.beginPath();
    ctx.moveTo(s.x - s.len, s.y);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawParticles(t) {
  const gathering = phase === 'gather' || phase === 'pulse' || phase === 'text';
  for (const p of particles) {
    if (gathering) {
      const speed = phase === 'gather' ? 0.055 : 0.12;
      p.x += (p.tx - p.x) * speed;
      p.y += (p.ty - p.y) * speed;
      const dx = p.tx - p.x, dy = p.ty - p.y;
      if (Math.abs(dx) < 2 && Math.abs(dy) < 2) p.gathered = true;
    } else {
      p.x += p.vx; p.y += p.vy;
      p.wobble += p.wobbleSpeed;
      if (p.x < -50 || p.x > W + 50) p.vx *= -1;
      if (p.y < -50 || p.y > H + 50) p.vy *= -1;
    }

    let px = p.x, py = p.y;
    if (phase === 'pulse' || phase === 'text') {
      const pulse = (heartScale - 1);
      const dx = p.tx - cx, dy = p.ty - cy;
      px = cx + dx * heartScale + Math.sin(t * 2 + p.wobble) * 0.5;
      py = cy + dy * heartScale + Math.cos(t * 2 + p.wobble) * 0.5;
    }

    const glow = phase === 'gather' || phase === 'pulse' || phase === 'text';
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    if (glow) {
      ctx.shadowColor = `hsla(${p.hue},100%,70%,0.9)`;
      ctx.shadowBlur = 6;
    }
    ctx.fillStyle = `hsla(${p.hue},100%,75%,${p.alpha})`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawSparkles(t) {
  if (phase !== 'pulse' && phase !== 'text') return;
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.life -= 0.025;
    s.x += s.vx; s.y += s.vy;
    if (s.life <= 0) { sparkles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
    ctx.shadowColor = `hsla(${s.hue},100%,80%,0.9)`;
    ctx.shadowBlur = 8;
    ctx.fillStyle = `hsla(${s.hue},100%,85%,${s.life})`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function spawnSparkle() {
  const i = Math.floor(Math.random() * PARTICLE_COUNT);
  const p = particles[i];
  if (!p) return;
  sparkles.push({
    x: p.tx + (Math.random() - 0.5) * 20,
    y: p.ty + (Math.random() - 0.5) * 20,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 1.5,
    r: Math.random() * 2 + 1,
    hue: 300 + Math.random() * 60,
    life: 1
  });
}

function drawText(t) {
  if (textAlpha <= 0) return;
  const floatY = Math.sin(t * 0.8) * 4;
  const fontSize = Math.max(24, Math.min(W * 0.1, 56));
  ctx.save();
  ctx.font = `${fontSize}px 'Georgia', 'Times New Roman', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const ty = cy + Math.min(W, H) * 0.35 + floatY;

  ctx.shadowColor = 'rgba(255,100,200,0.9)';
  ctx.shadowBlur = 30;
  ctx.fillStyle = `rgba(255,180,230,${textAlpha})`;
  ctx.fillText('Hải Yến', cx, ty);
  ctx.shadowBlur = 16;
  ctx.fillStyle = `rgba(255,220,245,${textAlpha * 0.7})`;
  ctx.fillText('Hải Yến', cx, ty);
  ctx.shadowBlur = 0;
  ctx.restore();
}

let lastShoot = 0;
let lastSparkle = 0;
let startTime = null;

function draw(ts) {
  if (!startTime) startTime = ts;
  const t = (ts - startTime) / 1000;
  phaseTimer = t;

  ctx.fillStyle = 'rgba(2,0,8,0.18)';
  ctx.fillRect(0, 0, W, H);
  drawGalaxy();
  drawStars(t);

  if (t - lastShoot > 4 + Math.random() * 5) {
    spawnShootingStar();
    lastShoot = t;
  }
  drawShootingStars();

  if (phase === 'scatter' && t > 2.2) phase = 'gather';
  if (phase === 'gather' && t > 5.5) phase = 'pulse';
  if (phase === 'pulse' && t > 6.2) phase = 'text';

  if (phase === 'pulse' || phase === 'text') {
    heartbeat = t;
    const bpm = 68;
    const beat = ((t * bpm / 60) % 1);
    heartScale = 1 + (beat < 0.15 ? Math.sin(beat / 0.15 * Math.PI) * 0.05 : beat < 0.35 ? Math.sin((beat - 0.15) / 0.2 * Math.PI) * 0.03 : 0);
  }

  if ((phase === 'pulse' || phase === 'text') && t - lastSparkle > 0.06) {
    spawnSparkle();
    lastSparkle = t;
  }

  drawParticles(t);
  drawSparkles(t);

  if (phase === 'text') {
    textAlpha = Math.min(1, textAlpha + 0.008);
  }
  drawText(t);

  requestAnimationFrame(draw);
}

resize();
initStars();
initParticles();
requestAnimationFrame(draw);

window.addEventListener('resize', () => {
  resize();
  initStars();
  initParticles();
  phase = 'scatter';
  startTime = null;
  phaseTimer = 0;
  textAlpha = 0;
  sparkles = [];
  shootingStars = [];
});
</script>
